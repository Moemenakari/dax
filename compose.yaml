services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-dax_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-dax_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    env_file: packages/backend/.env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  mysql_data:
